<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="cozza-ai">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.65" />
      <stop offset="55%" stop-color="#00B8D4" stop-opacity="0.18" />
      <stop offset="100%" stop-color="#00B8D4" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E5FF" />
      <stop offset="100%" stop-color="#26C6DA" />
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" />
    </filter>
  </defs>

  <!-- background -->
  <rect width="512" height="512" rx="96" fill="#000000" />

  <!-- ambient glow -->
  <circle cx="256" cy="256" r="220" fill="url(#glow)" />

  <!-- outer cockpit ring -->
  <circle cx="256" cy="256" r="170" fill="none" stroke="url(#ring)" stroke-width="6" opacity="0.55" />
  <circle cx="256" cy="256" r="138" fill="none" stroke="url(#ring)" stroke-width="3" opacity="0.35" />

  <!-- voice waveform / mic glyph -->
  <g transform="translate(256 256)" stroke="url(#ring)" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- mic capsule -->
    <rect x="-28" y="-92" width="56" height="120" rx="28" stroke-width="14" fill="#000000" />
    <!-- mic stem -->
    <path d="M -64 16 a 64 64 0 0 0 128 0" stroke-width="12" />
    <line x1="0" y1="80" x2="0" y2="120" stroke-width="12" />
    <!-- waveform bars -->
    <line x1="-110" y1="0" x2="-110" y2="0" stroke-width="10" />
    <line x1="-90" y1="-22" x2="-90" y2="22" stroke-width="10" />
    <line x1="-70" y1="-44" x2="-70" y2="44" stroke-width="10" />
    <line x1="70" y1="-44" x2="70" y2="44" stroke-width="10" />
    <line x1="90" y1="-22" x2="90" y2="22" stroke-width="10" />
    <line x1="110" y1="-8" x2="110" y2="8" stroke-width="10" />
  </g>

  <!-- bottom dot -->
  <circle cx="256" cy="416" r="6" fill="#00E5FF" filter="url(#soft)" />
</svg>
