<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="cozza-ai">
  <!-- ============================================================
       cozza-ai · cockpit AI per Viture Beast XR
       Concept: "C" minimale come occhiali XR wraparound, con un
       neuron-pulse cyan al centro che rappresenta l'AI.
       Palette: OLED puro #000 + accent #00E5FF
       ============================================================ -->
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="62%">
      <stop offset="0%" stop-color="#0A1F23" stop-opacity="1" />
      <stop offset="55%" stop-color="#020608" stop-opacity="1" />
      <stop offset="100%" stop-color="#000000" stop-opacity="1" />
    </radialGradient>

    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1" />
      <stop offset="20%" stop-color="#7CF0FF" stop-opacity="0.95" />
      <stop offset="55%" stop-color="#00E5FF" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#00E5FF" stop-opacity="0" />
    </radialGradient>

    <linearGradient id="visorGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00B8D4" />
      <stop offset="50%" stop-color="#00E5FF" />
      <stop offset="100%" stop-color="#7CF0FF" />
    </linearGradient>

    <filter id="softBlur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" />
    </filter>

    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Squircle background — iOS-style rounded square -->
  <rect width="512" height="512" rx="112" ry="112" fill="#000000" />
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bgGlow)" />

  <!-- Outer orbit ring (very subtle) -->
  <circle
    cx="256"
    cy="256"
    r="208"
    fill="none"
    stroke="#00E5FF"
    stroke-width="1.5"
    stroke-opacity="0.18"
    stroke-dasharray="2 8"
  />

  <!-- Visor / "C" arc (the main glyph: open on the right like a wraparound HMD) -->
  <g filter="url(#neonGlow)">
    <path
      d="M 360 144
         A 144 144 0 1 0 360 368"
      fill="none"
      stroke="url(#visorGrad)"
      stroke-width="34"
      stroke-linecap="round"
    />
  </g>

  <!-- Inner thinner echo of the C, deeper cyan -->
  <path
    d="M 340 176
       A 112 112 0 1 0 340 336"
    fill="none"
    stroke="#7CF0FF"
    stroke-width="3"
    stroke-linecap="round"
    stroke-opacity="0.55"
  />

  <!-- Soft halo behind the AI core -->
  <circle cx="256" cy="256" r="80" fill="url(#coreGlow)" filter="url(#softBlur)" />

  <!-- AI core: a tight cyan pulse with white-hot center -->
  <circle cx="256" cy="256" r="22" fill="#00E5FF" />
  <circle cx="256" cy="256" r="14" fill="#7CF0FF" />
  <circle cx="256" cy="256" r="7" fill="#FFFFFF" />

  <!-- Thin orbit lines suggesting neural mesh / gaze -->
  <g stroke="#00E5FF" stroke-width="1.5" stroke-linecap="round" opacity="0.55">
    <line x1="278" y1="256" x2="340" y2="256" />
    <line x1="234" y1="256" x2="172" y2="256" />
  </g>

  <!-- Tiny accent dots: orbit nodes at left of the C -->
  <g fill="#00E5FF">
    <circle cx="160" cy="200" r="3" opacity="0.9" />
    <circle cx="148" cy="256" r="4" opacity="1" />
    <circle cx="160" cy="312" r="3" opacity="0.9" />
  </g>

  <!-- Bottom signature glow -->
  <ellipse
    cx="256"
    cy="448"
    rx="90"
    ry="6"
    fill="#00E5FF"
    opacity="0.18"
    filter="url(#softBlur)"
  />
</svg>
