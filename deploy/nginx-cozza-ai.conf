# /etc/nginx/sites-available/cozza-ai
# Symlink: /etc/nginx/sites-enabled/cozza-ai
# Activates after `nginx -t && systemctl reload nginx`.
# SSL is added automatically by certbot --nginx (vedi deploy.sh).

server {
    listen 80;
    listen [::]:80;
    server_name cozza-ai.vibecanyon.com;

    # Static PWA bundle
    root /var/www/cozza-ai/apps/web/dist;
    index index.html;

    # Larger body for future audio/multimodal uploads
    client_max_body_size 5M;

    # Tight default headers — backend Hono adds CSP/HSTS on /api/* responses
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "microphone=(self), camera=(), geolocation=()" always;

    # Long cache for hashed assets
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /icons/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Service worker — never cache (PWA update flow)
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        expires off;
    }

    location = /registerSW.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        expires off;
    }

    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache" always;
    }

    # Proxy API to Node Hono on 3025
    location /api/ {
        proxy_pass http://127.0.0.1:3025;
        proxy_http_version 1.1;

        # SSE / streaming-friendly defaults
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
        chunked_transfer_encoding on;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # ─── Cozza Cockpit ────────────────────────────────────────────
    # /cockpit/         → HUD PWA static (XR + desktop view)
    # /cockpit/remote/  → Mobile remote/trackpad PWA static
    # /cockpit/api/     → REST API proxy to PC home (via reverse SSH tunnel :3031)
    # /cockpit/ws       → WebSocket bus (also via tunnel)
    #
    # The cockpit-bus runs ON THE HOME PC, exposed to the VPS via
    # autossh -R 3031:localhost:3030. nginx here is just a reverse proxy.
    # If the home PC is offline, /cockpit/api and /cockpit/ws return 502.
    # /cockpit/ and /cockpit/remote/ are served as static files and keep working.

    location /cockpit/ws {
        proxy_pass http://127.0.0.1:3031;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }

    location /cockpit/api/ {
        proxy_pass http://127.0.0.1:3031/;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location /cockpit/remote/ {
        alias /var/www/cozza-ai/apps/cockpit-remote/dist/;
        try_files $uri $uri/ /cockpit/remote/index.html;

        location ~* \.(html)$ {
            add_header Cache-Control "no-cache" always;
        }
        location ~* /assets/ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }

    location /cockpit/ {
        alias /var/www/cozza-ai/apps/cockpit-hud/dist/;
        try_files $uri $uri/ /cockpit/index.html;

        location ~* \.(html)$ {
            add_header Cache-Control "no-cache" always;
        }
        location ~* /assets/ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }
    # ──────────────────────────────────────────────────────────────

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hide secrets / internal files just in case
    location ~ /\.(env|git|husky|vscode) {
        deny all;
        return 404;
    }
}
